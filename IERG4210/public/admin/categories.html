<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Manage Categories</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>
  <main class="main-content">
    <div class="admin-container">
      <h1>Categories</h1>
      <form id="catForm" autocomplete="off">
        <input type="hidden" name="catid" />
        <input type="hidden" name="_csrf" id="csrfHidden" value="" />
        <label>Name: <input name="name" type="text" required maxlength="128" title="1–128 characters" /></label>
        <button type="submit" class="btn-primary">Save</button>
        <button type="button" id="createBtn" class="btn-secondary">Create New</button>
      </form>

      <h2 style="margin-top:1rem">Existing</h2>
      <ul id="list"></ul>
    </div>
  </main>

  <script src="/admin-client/admin-common.js"></script>
  <script src="/admin-client/admin-categories.js"></script>
</body>
</html>
