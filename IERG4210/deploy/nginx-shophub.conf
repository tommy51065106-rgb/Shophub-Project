# Copy to /etc/nginx/sites-available/ and symlink to sites-enabled.
# proxy_pass MUST match server.js: default PORT is 3000 (or process.env.PORT).
# Using sslip.io for HTTPS: https://18-221-245-149.sslip.io/
# sslip.io terminates SSL, Nginx listens on port 80

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/html/build;
    index index.html;

    server_name _;

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri /index.html;
    }

    location /uploads/ {
        alias /var/www/html/uploads/;
    }

    location /images/ {
        alias /var/www/html/public/images/;
    }
}
